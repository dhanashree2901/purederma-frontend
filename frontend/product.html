<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PureDerma | Product</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:40px;
}

.container{
  display:flex;
  gap:40px;
}

img{
  width:350px;
  height:350px;
  object-fit:cover;
}

.details{
  max-width:500px;
}

.price{
  font-size:22px;
  font-weight:bold;
  margin:15px 0;
}

button{
  padding:10px 15px;
  margin-right:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>Product Details</h1>

<div class="container">
  <img id="productImage">
  <div class="details">
    <h2 id="productName"></h2>
    <div class="price" id="productPrice"></div>
    <p id="productDescription"></p>

    <button onclick="addToCart()">Add to Cart</button>
    <button onclick="buyNow()">Buy Now</button>
  </div>
</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let productData = null;

async function loadProduct(){
  try{
    const response = await fetch("https://purederma-backend.onrender.com" + id);
    productData = await response.json();

    document.getElementById("productImage").src = "./" + productData.image;
    document.getElementById("productName").innerText = productData.name;
    document.getElementById("productPrice").innerText = "₹" + productData.price;
    document.getElementById("productDescription").innerText = productData.description;

  }catch(error){
    console.log(error);
  }
}

function addToCart(){
  const user = JSON.parse(localStorage.getItem("currentUser"));
  if(!user){
    alert("Login first");
    window.location.href = "login.html";
    return;
  }

  let cart = JSON.parse(localStorage.getItem("cart_" + user.email)) || [];

  const existing = cart.find(item => item._id === productData._id);

  if(existing){
    existing.quantity++;
  } else {
    cart.push({...productData, quantity:1});
  }

  localStorage.setItem("cart_" + user.email, JSON.stringify(cart));

  alert("Added to Cart");
}

function buyNow(){
  addToCart();
  window.location.href = "checkout.html";
}

loadProduct();

</script>

</body>
</html>
