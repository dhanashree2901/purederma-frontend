<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureDerma | Skin Questions</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

body{
  background:#fff;
  color:#111;
}

/* HEADER */
.header{
  padding:20px 40px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-weight:700;
  letter-spacing:2px;
}

.step-indicator{
  font-size:14px;
  color:#777;
}

/* MAIN */
.container{
  max-width:600px;
  margin:80px auto;
  padding:0 20px;
  text-align:center;
}

h1{
  font-size:24px;
  margin-bottom:30px;
}

.options{
  display:flex;
  flex-direction:column;
  gap:15px;
  margin-bottom:40px;
}

.option{
  padding:14px;
  border:1px solid #ccc;
  border-radius:6px;
  cursor:pointer;
  transition:0.2s;
}

.option:hover{
  border-color:#111;
}

.option.selected{
  border:2px solid #111;
  background:#f5f5f5;
}

/* BUTTONS */
.button-group{
  display:flex;
  justify-content:space-between;
}

button{
  padding:10px 25px;
  border-radius:4px;
  border:none;
  cursor:pointer;
  font-weight:600;
}

.next{
  background:#111;
  color:white;
}

.back{
  background:white;
  border:1px solid #111;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">PUREDERMA</div>
  <div class="step-indicator" id="stepText"></div>
</div>

<div class="container">

  <h1 id="question"></h1>

  <div class="options" id="options"></div>

  <div class="button-group">
    <button class="back" id="backBtn">Back</button>
    <button class="next" id="nextBtn">Next</button>
  </div>

</div>

<script>

// QUESTIONS DATA
const questions = [
  {
    text: "How does your skin feel after washing?",
    options: ["Tight & Dry", "Normal", "Oily & Shiny"]
  },
  {
    text: "What is your main skin concern?",
    options: ["Acne", "Dark Spots", "Fine Lines", "Sensitivity"]
  },
  {
    text: "How sensitive is your skin?",
    options: ["Very Sensitive", "Moderately Sensitive", "Not Sensitive"]
  },
  {
    text: "How often do you experience breakouts?",
    options: ["Rarely", "Occasionally", "Frequently", "Almost Always"]
  },
  {
    text: "How would you describe your skin’s hydration level?",
    options: ["Very Dry", "Slightly Dry", "Balanced", "Very Hydrated"]
  }
];

let current = 0;
let selectedAnswers = [];

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const stepText = document.getElementById("stepText");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");

// LOAD QUESTION
function loadQuestion() {
  const q = questions[current];
  questionEl.textContent = q.text;
  stepText.textContent = "Step " + (current + 1) + " of " + questions.length;
  optionsEl.innerHTML = "";

  q.options.forEach(option => {
    const div = document.createElement("div");
    div.className = "option";
    div.textContent = option;

    div.addEventListener("click", function() {
      document.querySelectorAll(".option").forEach(o => o.classList.remove("selected"));
      div.classList.add("selected");
      selectedAnswers[current] = option;
    });

    optionsEl.appendChild(div);
  });

  backBtn.style.display = current === 0 ? "none" : "inline-block";
}

// NEXT BUTTON
nextBtn.addEventListener("click", function() {

  if(!selectedAnswers[current]){
    alert("Please select an option.");
    return;
  }

  if(current < questions.length - 1){
    current++;
    loadQuestion();
  } else {
    localStorage.setItem("skinAnswers", JSON.stringify(selectedAnswers));
    window.location.href = "processing.html";
  }
});

// BACK BUTTON
backBtn.addEventListener("click", function(){
  if(current > 0){
    current--;
    loadQuestion();
  }
});

// INITIAL LOAD
loadQuestion();

</script>

</body>
</html>
