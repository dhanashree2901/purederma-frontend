<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureDerma | Wishlist</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
}

body{
  background:#f6f6f6;
  color:#111;
}

.header{
  background:white;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 80px;
  border-bottom:1px solid #eee;
}

.logo{
  font-size:24px;
  font-weight:700;
  letter-spacing:2px;
  cursor:pointer;
}

.container{
  max-width:1200px;
  margin:60px auto;
  padding:0 80px;
}

h1{
  margin-bottom:40px;
  font-size:28px;
}

.wishlist-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:30px;
}

.card{
  background:white;
  border-radius:10px;
  padding:20px;
  border:1px solid #ddd;
  display:flex;
  flex-direction:column;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  margin-bottom:15px;
}

.card h3{
  font-size:16px;
  margin-bottom:8px;
}

.card p{
  font-size:14px;
  margin-bottom:15px;
}

.card-buttons{
  margin-top:auto;
  display:flex;
  gap:10px;
}

.btn{
  flex:1;
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
}

.btn-dark{
  background:#111;
  color:white;
}

.btn-outline{
  background:white;
  border:1px solid #111;
}

.empty{
  text-align:center;
  margin-top:80px;
  font-size:18px;
  color:#666;
}

@media(max-width:900px){
  .container{ padding:0 20px; }
  .header{ padding:18px 20px; }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" onclick="goHome()">PUREDERMA</div>
</div>

<div class="container">

<h1>My Wishlist</h1>

<div id="wishlistContainer" class="wishlist-grid"></div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("currentUser"));

if(!user){
  window.location.href="login.html";
}

const wishlistKey = "wishlist_" + user.email;
const cartKey = "cart_" + user.email;

let wishlist = JSON.parse(localStorage.getItem(wishlistKey)) || [];
let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

const container = document.getElementById("wishlistContainer");

function renderWishlist(){

  container.innerHTML = "";

  if(wishlist.length === 0){
    container.innerHTML = "<div class='empty'>Your wishlist is empty.</div>";
    return;
  }

  wishlist.forEach((item,index)=>{

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.image}" alt="${item.name}">
      <h3>${item.name}</h3>
      <p>₹${item.price}</p>
      <div class="card-buttons">
        <button class="btn btn-dark" onclick="moveToCart(${index})">
          Move to Cart
        </button>
        <button class="btn btn-outline" onclick="removeItem(${index})">
          Remove
        </button>
      </div>
    `;

    container.appendChild(card);

  });
}

function moveToCart(index){

  const item = wishlist[index];

  const existingItem = cart.find(p => p.name === item.name);

  if(existingItem){
    existingItem.quantity += 1;
  }else{
    cart.push({...item, quantity:1});
  }

  wishlist.splice(index,1);

  localStorage.setItem(cartKey, JSON.stringify(cart));
  localStorage.setItem(wishlistKey, JSON.stringify(wishlist));

  renderWishlist();
}

function removeItem(index){
  wishlist.splice(index,1);
  localStorage.setItem(wishlistKey, JSON.stringify(wishlist));
  renderWishlist();
}

function goHome(){
  window.location.href="index.html";
}

renderWishlist();

</script>

</body>
</html>
