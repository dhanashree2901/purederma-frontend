<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureDerma | Your Results</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

body{
  background:#ffffff;
  color:#111;
}

/* HEADER */
.header{
  padding:20px 60px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-weight:700;
  letter-spacing:2px;
}

/* MAIN */
.container{
  max-width:800px;
  margin:60px auto;
  padding:0 20px;
}

h1{
  font-size:32px;
  margin-bottom:15px;
}

.sub{
  color:#666;
  margin-bottom:40px;
}

/* CARD */
.result-card{
  background:#f8f8f8;
  padding:30px;
  border-radius:12px;
  margin-bottom:40px;
}

.skin-type{
  font-size:22px;
  font-weight:600;
  margin-bottom:20px;
}

/* TAGS */
.tags{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:25px;
}

.tag{
  background:#111;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
}

/* PROGRESS */
.metric{
  margin-bottom:20px;
}

.metric-label{
  font-size:14px;
  margin-bottom:6px;
}

.progress-bar{
  width:100%;
  height:8px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.progress{
  height:100%;
  background:#111;
}

/* ROUTINE */
.routine{
  margin-top:30px;
}

.routine h3{
  margin-bottom:10px;
}

.routine ul{
  padding-left:18px;
  color:#555;
  line-height:1.7;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:30px;
  padding:12px 28px;
  background:#111;
  color:white;
  text-decoration:none;
  border-radius:4px;
  font-weight:600;
}

.btn:hover{
  background:#333;
}

/* Responsive */
@media(max-width:768px){
  .header{
    padding:20px;
  }

  .container{
    margin:40px auto;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">PUREDERMA</div>
</div>

<div class="container">

  <h1>Your Skin Profile</h1>
  <div class="sub">Based on your answers, here’s your personalized analysis.</div>

  <div class="result-card">

    <div class="skin-type" id="skinType"></div>

    <div class="tags" id="concernTags"></div>

    <div class="metric">
      <div class="metric-label">Oil Level</div>
      <div class="progress-bar">
        <div class="progress" id="oilBar"></div>
      </div>
    </div>

    <div class="metric">
      <div class="metric-label">Hydration</div>
      <div class="progress-bar">
        <div class="progress" id="hydrationBar"></div>
      </div>
    </div>

    <div class="metric">
      <div class="metric-label">Sensitivity</div>
      <div class="progress-bar">
        <div class="progress" id="sensitivityBar"></div>
      </div>
    </div>

    <div class="routine">
      <h3>Recommended Routine</h3>
      <ul id="routineList"></ul>
    </div>

  </div>

  <a href="shop.html" class="btn">Shop Recommended Products</a>

</div>

<script>

// Get answers
const answers = JSON.parse(localStorage.getItem("skinAnswers")) || [];

// Simple logic engine
let skinType = "Normal Skin";
let oil = 50;
let hydration = 50;
let sensitivity = 30;
let concerns = [];

if(answers.includes("Oily & Shiny")){
  skinType = "Oily Skin";
  oil = 80;
}

if(answers.includes("Tight & Dry")){
  skinType = "Dry Skin";
  hydration = 30;
}

if(answers.includes("Very Sensitive")){
  sensitivity = 80;
  concerns.push("Sensitivity");
}

if(answers.includes("Acne") || answers.includes("Frequently") || answers.includes("Almost Always")){
  concerns.push("Acne-Prone");
}

if(answers.includes("Dark Spots")){
  concerns.push("Dark Spots");
}

// Display Skin Type
document.getElementById("skinType").textContent = skinType;
localStorage.setItem("detectedSkinType", skinType);

// Display Tags
const tagContainer = document.getElementById("concernTags");
concerns.forEach(c => {
  const span = document.createElement("div");
  span.className = "tag";
  span.textContent = c;
  tagContainer.appendChild(span);
});

// Progress Bars
document.getElementById("oilBar").style.width = oil + "%";
document.getElementById("hydrationBar").style.width = hydration + "%";
document.getElementById("sensitivityBar").style.width = sensitivity + "%";

// Routine Suggestions
const routineList = document.getElementById("routineList");

let routine = [
  "Gentle Cleanser",
  "Hydrating Serum",
  "Moisturizer",
  "Sunscreen (SPF 50)"
];

if(skinType === "Oily Skin"){
  routine[1] = "Niacinamide Serum";
}

if(skinType === "Dry Skin"){
  routine[1] = "Hyaluronic Acid Serum";
}

routine.forEach(item => {
  const li = document.createElement("li");
  li.textContent = item;
  routineList.appendChild(li);
});

</script>

</body>
</html>
