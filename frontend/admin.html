<!DOCTYPE html>
<html>
<head>
<title>PureDerma | Admin Dashboard</title>

<style>
body{
  font-family:Arial;
  padding:40px;
  background:#f8f8f8;
}

h1{
  margin-bottom:30px;
}

.section{
  margin-bottom:50px;
  background:white;
  padding:25px;
  border-radius:8px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

button{
  padding:6px 12px;
  margin-right:5px;
  margin-top:8px;
  cursor:pointer;
}

.analytics-box{
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>Admin Dashboard</h1>

<div class="section">
  <h2>Analytics</h2>
  <div id="analytics" class="analytics-box"></div>
</div>

<div class="section">
  <h2>Registered Users</h2>
  <div id="users"></div>
</div>

<div class="section">
  <h2>All Orders</h2>
  <div id="orders"></div>
</div>

<script src="js/auth.js"></script>
<script src="js/products.js"></script>

<script>

// ===== ADMIN ACCESS CHECK =====
if(localStorage.getItem("admin") !== "true"){
  alert("Access Denied");
  window.location.href = "admin-login.html";
}

// ===== LOAD USERS =====
const ordersDiv = document.getElementById("orders");
let totalRevenue = 0;
let totalOrders = 0;

async function loadOrders(){

  try{

    const response = await fetch("http://localhost:5000/api/orders");
    const orders = await response.json();

    if(orders.length === 0){
      ordersDiv.innerHTML = "No orders found.";
      return;
    }

    orders.forEach(order => {

      totalRevenue += order.totalAmount;
      totalOrders++;

      ordersDiv.innerHTML += `
        <div style="border:1px solid #ddd;padding:15px;margin-bottom:20px;border-radius:6px;">
          <strong>User:</strong> ${order.userEmail}<br>
          <strong>Order ID:</strong> ${order._id}<br>
          <strong>Total:</strong> ₹${order.totalAmount.toFixed(2)}<br>
          <strong>Date:</strong> ${new Date(order.createdAt).toLocaleDateString()}
        </div>
      `;
    });

    document.getElementById("analytics").innerHTML = `
      Total Orders: ${totalOrders} <br>
      Total Revenue: ₹${totalRevenue.toFixed(2)}
    `;

  }catch(error){
    console.log(error);
  }

}

loadOrders();

// ===== DISPLAY ANALYTICS =====
document.getElementById("analytics").innerHTML = `
  Total Orders: ${totalOrders} <br>
  Total Revenue: ₹${totalRevenue}
`;

// ===== UPDATE ORDER STATUS =====
function updateStatus(email,index,newStatus){

  let orders = JSON.parse(localStorage.getItem("orders_" + email)) || [];

  orders[index].status = newStatus;

  localStorage.setItem("orders_" + email, JSON.stringify(orders));

  alert("Order status updated to " + newStatus);

  location.reload();
}

</script>

</body>
</html>
