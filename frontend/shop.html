<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PureDerma | Shop</title>

  <style>
    body{
      font-family:Arial;
      margin:0;
      background:#fff;
    }

    .header{
      padding:20px 40px;
      display:flex;
      justify-content:space-between;
      border-bottom:1px solid #eee;
    }

    .logo{
      font-weight:bold;
    }

    .container{
      padding:40px;
    }

    h1{
      margin-bottom:30px;
    }

    .grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,250px));
  gap:20px;
  justify-content:start;
}

    .card{
      border:1px solid #eee;
      padding:20px;
      border-radius:10px;
    }

    .card img{
      width:100%;
      height:200px;
      object-fit:cover;
      margin-bottom:10px;
    }

    .price{
      font-weight:bold;
      margin:10px 0;
    }

    button{
      padding:8px 12px;
      cursor:pointer;
      margin-right:5px;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="logo">PUREDERMA</div>
  <a href="cart.html">Cart 🛒</a>
</div>

<div class="container">
  <h1 id="heading">Recommended Products</h1>
  <div class="grid" id="productGrid"></div>
</div>

<script>

let skinType = localStorage.getItem("detectedSkinType");

if(!skinType){
  skinType = "Normal Skin";
}

document.getElementById("heading").innerText =
  "Recommended for " + skinType;

const grid = document.getElementById("productGrid");

let products = []; // store backend products


// LOAD PRODUCTS FROM BACKEND
async function loadProducts(){
  try{

    const response = await fetch("https://purederma-backend.onrender.com/api/products");
    products = await response.json();

    const filtered = products.filter(p =>
      p.skinType === skinType || p.skinType === "All"
    );

    grid.innerHTML = "";

    filtered.forEach(product => {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
    <img src="./${product.image}" style="cursor:pointer"
         onclick="openProduct('${product._id}')">
    <div style="cursor:pointer"
         onclick="openProduct('${product._id}')">
         ${product.name}
    </div>
        <div class="price">₹${product.price}</div>
        <button onclick="addToCart('${product._id}')">Add to Cart</button>
        <button onclick="addToWishlist('${product._id}')">Wishlist</button>
        <button onclick="buyNow('${product._id}')">Buy Now</button>
      `;

      grid.appendChild(div);
    });

  }catch(error){
    console.log("Error loading products:", error);
  }
}


// CART
function addToCart(id){

  const user = JSON.parse(localStorage.getItem("currentUser"));
  if(!user){
    alert("Please login first");
    window.location.href = "login.html";
    return;
  }

  let cart = JSON.parse(localStorage.getItem("cart_" + user.email)) || [];

  const product = products.find(p => p._id === id);

  const existing = cart.find(item => item._id === id);

  if(existing){
    existing.quantity++;
  } else {
    cart.push({...product, quantity:1});
  }

  localStorage.setItem("cart_" + user.email, JSON.stringify(cart));

  alert("Added to Cart");
}


// BUY NOW
function buyNow(id){
  addToCart(id);
  window.location.href = "checkout.html";
}


// WISHLIST
function addToWishlist(id){

  const user = JSON.parse(localStorage.getItem("currentUser"));
  if(!user){
    alert("Login first");
    window.location.href="login.html";
    return;
  }

  let wishlist = JSON.parse(localStorage.getItem("wishlist_" + user.email)) || [];

  const product = products.find(p => p._id === id);

  if(!wishlist.find(item => item._id === id)){
    wishlist.push(product);
    localStorage.setItem("wishlist_" + user.email, JSON.stringify(wishlist));
    alert("Added to Wishlist");
  } else {
    alert("Already in Wishlist");
  }
}

function openProduct(id){
  window.location.href = "product.html?id=" + id;
}

loadProducts();

</script>

</body>
</html>
