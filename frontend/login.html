<!DOCTYPE html>
<html>
<head>
<title>PureDerma | Login</title>

<style>
body{
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.box{
  width:320px;
  padding:30px;
  border:1px solid #eee;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.05);
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  background:#111;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#333;
}

.link{
  margin-top:15px;
  font-size:14px;
  text-align:center;
  cursor:pointer;
  color:#555;
}

.link:hover{
  color:black;
}
</style>

</head>
<body>

<div class="box">
  <h2>Login</h2>

  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>

  <button onclick="loginUser()">Login</button>

  <div class="link" onclick="goToSignup()">New user? Sign Up</div>
</div>

<script>

async function loginUser() {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!email || !password){
    alert("Please enter email and password");
    return;
  }

  try {

    const response = await fetch("https://purederma-backend.onrender.com", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (!response.ok) {
      alert(data.message);
      return;
    }

    // Save logged in user
    localStorage.setItem("currentUser", JSON.stringify(data.user));

    alert("Login successful!");

    window.location.href = "index.html";

  } catch (error) {
    alert("Server error. Make sure backend is running.");
  }
}

function goToSignup(){
  window.location.href = "signup.html";
}

</script>

</body>
</html>
