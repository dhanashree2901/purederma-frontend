<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PureDerma | My Account</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

body{
background:#fafafa;
color:#1a1a1a;
}

/* HEADER */

.header{
background:white;
padding:20px 80px;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:700;
letter-spacing:2px;
}

.nav button{
padding:10px 18px;
border-radius:8px;
border:none;
background:#1a1a1a;
color:white;
cursor:pointer;
margin-left:10px;
}

.nav button:hover{
background:#333;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:60px auto;
padding:0 40px;
}

h1{
font-size:32px;
margin-bottom:40px;
}

/* GRID */

.profile-grid{
display:grid;
grid-template-columns:1fr 2fr;
gap:40px;
}

.card{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.05);
}

.card h3{
margin-bottom:20px;
}

/* ORDER CARD */

.order-card{
border:1px solid #eee;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.order-meta{
font-size:14px;
margin-bottom:10px;
}

.status{
font-size:13px;
padding:4px 10px;
border-radius:20px;
display:inline-block;
}

.paid{
background:#eafaf1;
color:#27ae60;
}

.view-btn{
margin-top:10px;
padding:8px 14px;
border-radius:6px;
border:none;
background:#1a1a1a;
color:white;
cursor:pointer;
}

.view-btn:hover{
background:#333;
}

@media(max-width:900px){

.profile-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="header">
<div class="logo">PUREDERMA</div>

<div class="nav">
<button onclick="goShop()">Shop</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<div class="container">

<h1>My Account</h1>

<div class="profile-grid">

<!-- USER INFO -->

<div class="card">
<h3>Personal Information</h3>
<div id="userInfo"></div>
</div>

<!-- ORDER HISTORY -->

<div class="card">
<h3>Order History</h3>
<div id="ordersContainer"></div>
</div>

</div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("currentUser"));

let orders = [];

if(!user){

window.location.href="login.html";

}

/* USER INFO */

document.getElementById("userInfo").innerHTML = `
<strong>Name:</strong> ${user.name}<br><br>
<strong>Email:</strong> ${user.email}<br><br>
<strong>Mobile:</strong> ${user.mobile || "Not Available"}
`;


/* LOAD ORDERS */

async function loadOrders(){

try{

const response = await fetch(
`https://purederma-backend.onrender.com/api/orders/${encodeURIComponent(user.email)}`
);

orders = await response.json();

const container = document.getElementById("ordersContainer");

container.innerHTML = "";

if(!orders || orders.length === 0){

container.innerHTML="No orders placed yet.";

return;

}

orders.reverse().forEach(order => {

container.innerHTML += `

<div class="order-card">

<div class="order-meta">

<strong>Order ID:</strong> ${order._id}<br>
<strong>Date:</strong> ${new Date(order.createdAt).toLocaleDateString()}<br>
<strong>Total:</strong> ₹${order.totalAmount.toFixed(2)}

</div>

<div>

<span class="status paid">Paid</span>

</div>

<button class="view-btn" onclick="trackOrder('${order._id}')">
Track Order
</button>

<button class="view-btn" onclick="viewInvoice('${order._id}')">
View Invoice
</button>

</div>

`;

});

}catch(error){

console.log("Order loading error:",error);

}

}

loadOrders();



/* TRACK ORDER */

function trackOrder(orderId){

window.location.href = "track.html?orderId=" + orderId;

}



/* VIEW INVOICE */

function viewInvoice(orderId){

const selectedOrder = orders.find(o => o._id === orderId);

localStorage.setItem("latestOrder",JSON.stringify(selectedOrder));

window.location.href="invoice.html";

}


/* NAVIGATION */

function goShop(){

window.location.href="shop.html";

}

function logout(){

localStorage.removeItem("currentUser");

window.location.href="index.html";

}

</script>

</body>
</html>
