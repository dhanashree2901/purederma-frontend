<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PureDerma | Search</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
}

body{
  background:#f6f6f6;
  color:#111;
}

.header{
  background:white;
  padding:18px 80px;
  border-bottom:1px solid #eee;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:22px;
  font-weight:700;
  letter-spacing:2px;
  cursor:pointer;
}

.search-bar{
  max-width:700px;
  margin:40px auto;
  padding:0 20px;
}

.search-bar input{
  width:100%;
  padding:14px 20px;
  border-radius:30px;
  border:1px solid #ccc;
  font-size:16px;
}

.container{
  max-width:1200px;
  margin:40px auto;
  padding:0 80px;
}

.results-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:30px;
}

.card{
  background:white;
  border-radius:10px;
  padding:20px;
  border:1px solid #ddd;
  display:flex;
  flex-direction:column;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  margin-bottom:15px;
}

.card h3{
  font-size:16px;
  margin-bottom:8px;
}

.card p{
  font-size:14px;
  margin-bottom:10px;
}

.empty{
  text-align:center;
  font-size:18px;
  margin-top:60px;
  color:#666;
}

@media(max-width:900px){
  .container{ padding:0 20px; }
  .header{ padding:18px 20px; }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" onclick="goHome()">PUREDERMA</div>
</div>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search skincare products...">
</div>

<div class="container">
  <div id="resultsContainer" class="results-grid"></div>
</div>

<script>

const searchInput = document.getElementById("searchInput");
const resultsContainer = document.getElementById("resultsContainer");

let products = JSON.parse(localStorage.getItem("products")) || [];

function renderResults(filteredProducts){

  resultsContainer.innerHTML = "";

  if(filteredProducts.length === 0){
    resultsContainer.innerHTML = "<div class='empty'>No products found.</div>";
    return;
  }

  filteredProducts.forEach(product => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${product.image}" alt="${product.name}">
      <h3>${product.name}</h3>
      <p>₹${product.price}</p>
    `;

    resultsContainer.appendChild(card);

  });
}

searchInput.addEventListener("input", function(){

  const query = this.value.toLowerCase();

  const filtered = products.filter(product =>
    product.name.toLowerCase().includes(query)
  );

  renderResults(filtered);

});

renderResults(products);

function goHome(){
  window.location.href="index.html";
}

</script>

</body>
</html>
